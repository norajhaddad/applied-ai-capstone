<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kinematics Practice Quiz{% endblock %}</title>
</head>
<body>
  <header>
    <h1>Kinematics Practice Quiz</h1>
    <p class="score">
      Score: {{ session.get("correct", 0) }} / {{ session.get("attempts", 0) }}
      <form method="post" action="{{ url_for('reset') }}" class="reset">
        <button type="submit">Reset</button>
      </form>
    </p>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
