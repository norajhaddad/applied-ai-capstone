<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kinematics Practice Quiz{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <h1 class="site-title">Kinematics Practice Quiz</h1>
      <div class="scoreboard">
        <span class="scoreboard__label">Score</span>
        <span class="scoreboard__value">{{ session.get("correct", 0) }} / {{ session.get("attempts", 0) }}</span>
        <form class="scoreboard__reset" method="post" action="{{ url_for('reset') }}">
          <button class="btn btn--ghost" type="submit">Reset</button>
        </form>
      </div>
    </header>

    <main class="content">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>SUVAT practice &middot; built as a capstone</p>
    </footer>
  </div>
</body>
</html>
